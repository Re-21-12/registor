<ion-header>
  <ion-toolbar>
    <ion-title>Crear cuenta</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="auth-container">

    <div class="auth-logo">
      <h1>Registor</h1>
      <p>Crea tu cuenta gratuita</p>
    </div>

    <app-dynamic-form
      [fields]="registerFields"
      [hideActions]="true"
      (data)="onData($event)"
      #dynForm
    />

    @if (error()) {
      <div class="error-banner">
        <ion-text color="danger">{{ error() }}</ion-text>
      </div>
    }

    <ion-button expand="block" [disabled]="loading()" class="submit-btn"
      (click)="dynForm.onSubmit()">
      @if (loading()) {
        <ion-spinner slot="start" name="crescent" />
        Registrando...
      } @else {
        <ion-icon slot="start" name="person-add-outline" />
        Registrarse
      }
    </ion-button>

    <p class="login-link">
      ¿Ya tienes cuenta?
      <a routerLink="/auth/login">Inicia sesión</a>
    </p>

  </div>
</ion-content>
