<app-dynamic-form
  [fields]="fields"
  [initialData]="formInitialData"
  [hideActions]="true"
  (data)="onData($event)"
  #dynForm
/>

<div class="form-actions">
  <ion-button fill="outline" color="medium" (click)="onCancel()">
    <ion-icon slot="start" name="close-outline" />
    Cancelar
  </ion-button>
  <ion-button color="success" (click)="dynForm.onSubmit()">
    <ion-icon slot="start" name="save-outline" />
    Guardar
  </ion-button>
</div>
