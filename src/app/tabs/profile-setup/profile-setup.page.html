<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/profile" />
    </ion-buttons>
    <ion-title>Configurar perfil</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  @if (error()) {
    <ion-text color="danger">{{ error() }}</ion-text>
  }
  <app-patient-profile-form
    (save)="onSave($event)"
    (cancel)="onCancel()" />
</ion-content>
